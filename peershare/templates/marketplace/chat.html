{% extends 'base.html' %}
{% block content %}

<div class="chat-wrapper">
  <div class="chat-header">
    <h2>💬 Chat with
      <a href="{% url 'public_profile' other_user.username %}">{{ other_user.username }}</a>
    </h2>
  </div>

  <div class="chat-box" id="chatBox">
    {% for msg in msgs %}
    <div class="msg-bubble {% if msg.sender == request.user %}mine{% else %}theirs{% endif %}">
      <p>{{ msg.message }}</p>
      <small>{{ msg.timestamp|date:"H:i · d M" }}</small>
    </div>
    {% empty %}
    <div class="chat-empty">
      <p>👋 No messages yet. Say hello!</p>
    </div>
    {% endfor %}
  </div>

  <form method="POST" class="chat-input-form">
    {% csrf_token %}
    {{ form.message }}
    <button type="submit" class="btn">Send 📤</button>
  </form>
</div>

<script>
  // Auto scroll to bottom
  const box = document.getElementById('chatBox');
  box.scrollTop = box.scrollHeight;
</script>

{% endblock %}
