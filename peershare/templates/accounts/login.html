{% extends 'base.html' %}
{% block content %}

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-header">
      <h2>🔐 Welcome Back</h2>
      <p>Login to your PeerShare account</p>
    </div>

    <form method="POST" class="auth-form">
      {% csrf_token %}
      {% for field in form %}
      <div class="field-group">
        <label>{{ field.label }}</label>
        {{ field }}
        {% for error in field.errors %}
          <span class="field-error">⚠ {{ error }}</span>
        {% endfor %}
      </div>
      {% endfor %}
      <button type="submit" class="btn full-width">Login</button>
    </form>

    <p class="auth-footer">
      New student? <a href="{% url 'register' %}">Create account</a>
    </p>
  </div>
</div>

{% endblock %}
